<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Check-In</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="subpage">
      <header class="topbar">
        <div class="brand"><div class="brand-icon">⌘</div><span>EventHub</span></div>
        <nav class="nav-links">
          <a href="./public-view.html" class="nav-link">🌐 Public View</a>
          <a href="./index.html" class="nav-link">📅 Events</a>
          <a href="./check-in.html" class="nav-link active">▦ Check-In</a>
        </nav>
        <a href="./public-view.html" class="user-btn">👤</a>
      </header>

      <div class="placeholder-card">
        <h1>QR Check-In Desk</h1>
        <p>Choose an event and register attendees as they arrive. (Simulated check-in flow)</p>

        <form id="checkInForm" class="checkin-form">
          <label>
            Event
            <select id="eventSelect" required>
              <option>Annual Tech Conference 2026</option>
              <option>Product Launch Webinar</option>
              <option>Team Building Workshop</option>
              <option>Q1 All-Hands Meeting</option>
              <option>Design Sprint Kickoff</option>
              <option>Customer Appreciation Gala</option>
            </select>
          </label>
          <label>
            Attendee Name
            <input id="attendeeName" type="text" placeholder="e.g. Alex Carter" required />
          </label>
          <label>
            Ticket / QR ID
            <input id="ticketId" type="text" placeholder="e.g. DND-2048" required />
          </label>
          <button class="primary-btn" type="submit">Confirm Check-In</button>
        </form>

        <div class="checkin-list-wrap">
          <h2>Recent Check-Ins</h2>
          <ul id="checkInList" class="checkin-list"></ul>
        </div>

        <a href="./index.html" class="primary-btn back-btn">Back to Events</a>
      </div>
    </div>

    <script>
      const STORAGE_KEY = 'eventhub-checkins-v1';
      const form = document.getElementById('checkInForm');
      const eventSelect = document.getElementById('eventSelect');
      const attendeeName = document.getElementById('attendeeName');
      const ticketId = document.getElementById('ticketId');
      const checkInList = document.getElementById('checkInList');

      const urlEvent = new URLSearchParams(window.location.search).get('event');
      if (urlEvent) {
        const options = Array.from(eventSelect.options).map((o) => o.value);
        if (options.includes(urlEvent)) eventSelect.value = urlEvent;
      }

      function readStore() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch {
          return [];
        }
      }

      function writeStore(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function render() {
        const selectedEvent = eventSelect.value;
        const records = readStore().filter((r) => r.event === selectedEvent).slice().reverse();
        checkInList.innerHTML = records.length
          ? records
              .map((r) => `<li><strong>${r.name}</strong> • ${r.ticket} <span>${r.time}</span></li>`)
              .join('')
          : '<li class="muted">No check-ins yet for this event.</li>';
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const newRecord = {
          event: eventSelect.value,
          name: attendeeName.value.trim(),
          ticket: ticketId.value.trim(),
          time: new Date().toLocaleString()
        };

        if (!newRecord.name || !newRecord.ticket) return;

        const records = readStore();
        records.push(newRecord);
        writeStore(records);

        attendeeName.value = '';
        ticketId.value = '';
        attendeeName.focus();
        render();
      });

      eventSelect.addEventListener('change', render);
      render();
    </script>
  </body>
</html>
